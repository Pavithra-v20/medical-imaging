version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ctuser
      POSTGRES_PASSWORD: ctpassword
      POSTGRES_DB: ct_agent
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  triton:
    image: nvcr.io/nvidia/tritonserver:24.04-py3
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
    volumes:
      - ./model_repository:/models
    command: tritonserver --model-repository=/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  agent:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - postgres
      - triton
    volumes:
      - ./storage:/app/storage

  vista3d:
    image: nvcr.io/nim/nvidia/vista3d:1.0.0
    ports:
      - "8001:8000"
    environment:
      - NGC_API_KEY=${NVIDIA_API_KEY}
    volumes:
      - ./storage:/mnt/storage
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  pg_data:
